name: Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_REPO: guqijin/campussupplychainsecurityplatform

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: prep
        shell: bash
        run: |
          backend_tags="${IMAGE_REPO}:backend-latest"
          frontend_tags="${IMAGE_REPO}:frontend-latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            backend_tags="${backend_tags}"$'\n'"${IMAGE_REPO}:backend-${GITHUB_REF_NAME}"
            frontend_tags="${frontend_tags}"$'\n'"${IMAGE_REPO}:frontend-${GITHUB_REF_NAME}"
          fi
          {
            echo 'backend_tags<<EOF'
            echo "${backend_tags}"
            echo 'EOF'
            echo 'frontend_tags<<EOF'
            echo "${frontend_tags}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.frontend_tags }}
